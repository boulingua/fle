name: Build and deploy

on:
  push:
    branches: [main, "migration/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: "0.159.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pyyaml reportlab pypdf python-pptx pillow

      # ── Quarto: render the 156 *_exam.qmd files to PDF (non-blocking).
      # If TinyTeX bootstrap or LaTeX rendering fails for transient reasons
      # (rate limits, mirror outages), the Hugo deploy proceeds without
      # refreshed exam PDFs — they're not yet linked from the new Hugo site
      # and can be regenerated by re-running this workflow.
      - name: Render exam PDFs (non-blocking)
        id: exams
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Setup Quarto + TinyTeX. Both bootstrap commands hit the GitHub API
          # for release metadata; GH_TOKEN avoids anonymous 403s.
          curl -fsSL https://github.com/quarto-dev/quarto-cli/releases/latest/download/quarto-linux-amd64.deb -o /tmp/quarto.deb
          sudo dpkg -i /tmp/quarto.deb
          quarto install tinytex --update-path --quiet
          quarto render --to pdf
          python - <<'PY'
          import sys, pathlib
          from pypdf import PdfReader
          out = pathlib.Path('_exams_out')
          pdfs = list(out.rglob('*_exam.pdf')) if out.exists() else []
          if not pdfs:
              print('No exam PDFs produced.', file=sys.stderr); sys.exit(1)
          bad = []
          for p in pdfs:
              author = (PdfReader(str(p)).metadata or {}).get('/Author', '') or ''
              if 'Le Boulanger' not in author:
                  bad.append(str(p))
          if bad:
              print('MISSING ATTRIBUTION:', *bad, sep='\n  '); sys.exit(1)
          print(f'All {len(pdfs)} exam PDFs attributed to S. Le Boulanger.')
          PY
          mkdir -p static/downloads
          rsync -a --include='*/' --include='*_exam.pdf' --exclude='*' \
            _exams_out/ static/downloads/

      - name: Note exam-render outcome
        if: always()
        run: |
          if [ "${{ steps.exams.outcome }}" = "failure" ]; then
            echo "::warning::Exam PDF render failed (non-blocking). Hugo deploy proceeds."
          else
            echo "Exam PDFs rendered and staged."
          fi

      - name: Generate worksheet placeholders (existing pipeline)
        continue-on-error: true
        run: |
          if [ -f _scripts/make_placeholder_worksheets.py ]; then
            python _scripts/make_placeholder_worksheets.py
          else
            echo "make_placeholder_worksheets.py not present — skipping."
          fi

      # ── Materials Discovery Network: build graph.json + run CI gates.
      # Fails the build on:
      #   - any material-bearing article without `tags:`
      #   - any `skills_focus` value not in TOPIC_ALIAS / data/topics.yml
      #   - graph.json with zero edges (topical layer too sparse)
      #   - any topic in data/topics.yml with zero articles
      - name: Build Materials Network graph
        run: python _scripts/build_graph.py

      # Independent validator: catches duplicate ids/urls, dangling edges,
      # nodes carrying topics not in data/topics.yml, and article-count
      # drift between graph.json and content/track_*/units/*.md.
      - name: Validate network data (post-build invariants)
        run: python scripts/validate_network_data.py

      # Hard-fail if any content/.md is missing required frontmatter,
      # carries un-migrated Quarto constructs, or links to assets that
      # don't exist. Soft warnings (no-tags, ≥1800 chars w/o VG Wort)
      # only print and don't block.
      - name: Audit content (frontmatter + Quarto carryover + assets)
        run: python scripts/audit_content.py

      # ── Hugo build ───────────────────────────────────────────────
      - name: Install Hugo
        run: |
          wget -q -O /tmp/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb

      - name: Verify Plausible snippet present in head partial
        run: |
          # source partial keeps quotes; minified output drops them — accept either
          grep -qE 'data-domain="?boulingua\.github\.io/fle"?' \
            layouts/_partials/head/extensions.html

      - uses: actions/configure-pages@v5
        id: pages

      - name: Hugo build
        run: hugo --minify --gc --baseURL "${{ steps.pages.outputs.base_url || 'https://boulingua.github.io/fle/' }}"

      - name: Verify Plausible snippet in rendered home page
        run: grep -qE 'data-domain="?boulingua\.github\.io/fle"?' public/index.html

      - name: Verify VG Wort pixels (1:1 manifest <-> public/)
        run: bash scripts/verify-vgwort.sh vgwort-manifest.csv public

      # Restored from the qmd-era publish.yml: hard-fail if any legal page
      # contains a placeholder string (TODO, [NAME], Lorem ipsum, ...).
      - name: Legal-page placeholder gate
        run: bash scripts/check_legal_placeholders.sh public

      # Defense-in-depth: every article page must carry the author name
      # somewhere in the rendered HTML. Coder theme + footer partial emit
      # it via Site.Params.author; this gate catches regressions.
      - name: Author attribution gate
        run: bash scripts/check_author_attribution.sh public

      # Audit /Author metadata on every PDF under static/ (worksheets,
      # exam PDFs if produced). Decoupled from the non-blocking exam-
      # render step so failures here always block deploy.
      - name: PDF author attribution audit
        run: python scripts/check_pdf_attribution.py

      # FLE BW only: every bildungsplan: entry in unit frontmatter must
      # be rooted in a top-level code declared by
      # _resources/bildungsplan_bw_franzoesisch.yml; the canonical source
      # URLs must still resolve.
      - name: Bildungsplan BW reference gate
        run: python scripts/check_bildungsplan_refs.py

      # ── Pagefind index (Phase 5 of materials network).
      # Scans the built HTML under public/ and writes public/pagefind/.
      # Runtime served as static assets alongside everything else.
      - name: Pagefind index
        run: |
          npx -y pagefind@^1 --site public
          # CI gate from Phase 1 prompt: index must be non-empty.
          if [ ! -f public/pagefind/pagefind.js ]; then
            echo "::error::Pagefind index missing — public/pagefind/pagefind.js not produced."
            exit 1
          fi

      # ── Phase 6 CI gate: bundle size budget for /materiel/.
      # Phase 5 prompt sets ≤ 280 KB gzipped total JS for the materials
      # hub. Walks every <script src=...> referenced from the page, sums
      # gzipped sizes (CDN scripts excluded — they're not in public/),
      # fails if over budget. Loud, specific.
      - name: Materials network — JS bundle size budget
        run: |
          set -eu
          page=public/materiel/index.html
          [ -f "$page" ] || { echo "::error::missing $page"; exit 1; }
          # Hugo --minify drops attribute quotes, so the regex must handle
          # both `src="...js"` and `src=...js` forms.
          mapfile -t srcs < <(grep -oE 'src=("[^"]*\.js[^"]*"|[^"<> ]*\.js[^"<> ]*)' "$page" \
            | sed -E 's/^src=//; s/^"//; s/"$//' | sort -u)
          total=0
          echo "Local JS resources referenced from /materiel/:"
          for s in "${srcs[@]}"; do
            case "$s" in
              http*) continue ;;
              /fle/*) p="public${s#/fle}" ;;
              /*)    p="public$s" ;;
              *)     p="public/$s" ;;
            esac
            if [ -f "$p" ]; then
              size=$(gzip -c "$p" | wc -c)
              total=$((total + size))
              printf "  %7d B gz  %s\n" "$size" "$p"
            fi
          done
          echo "Total: $total B gzipped (budget: 286720 / 280 KB)"
          if [ "$total" -eq 0 ]; then
            echo "::error::Bundle gate found 0 local JS — regex broken."
            exit 1
          fi
          if [ "$total" -gt 286720 ]; then
            echo "::error::JS bundle exceeds 280 KB gzipped budget."
            exit 1
          fi

      # ── Phase 6 a11y: Lighthouse only.
      # Lighthouse uses axe-core internally for its accessibility category,
      # so a separate axe-cli step would duplicate work and drag in a
      # ChromeDriver/Chrome version dependency that breaks frequently on
      # the GHA runner. Baseline established at 95/100 on first run; gate
      # is hard once we have headroom.
      - name: Serve public/ for audits
        run: |
          npx -y http-server@^14 public -p 8080 -s &
          echo $! > /tmp/server.pid
          for i in $(seq 1 20); do
            if curl -fsS http://localhost:8080/ > /dev/null; then break; fi
            sleep 0.5
          done

      - name: Lighthouse a11y (target ≥ 95)
        run: |
          npx -y lighthouse@^11 \
            http://localhost:8080/materiel/ \
            --only-categories=accessibility \
            --output=json --output-path=/tmp/lh.json \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --quiet
          score=$(node -e "const d=require('/tmp/lh.json');console.log(Math.round((d.categories.accessibility.score||0)*100))")
          echo "Lighthouse accessibility score: $score / 100 (target ≥ 95)"
          if [ "$score" -lt 95 ]; then
            echo "::error::Lighthouse a11y score $score below 95."
            exit 1
          fi

      - name: Stop audit server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then kill "$(cat /tmp/server.pid)" || true; fi

      # Broken-link check via lychee. Hugo emits absolute paths with the
      # production /fle/ baseURL prefix, so we --remap them away before
      # resolution against the local public/ tree. External links are
      # warned (not failed) — transient outages of bildungsplaene-bw.de,
      # YouTube, etc. shouldn't block site deploys; the bildungsplan-refs
      # gate above handles canonical-source liveness specifically.
      - name: Broken-link check (lychee — internal only blocking)
        uses: lycheeverse/lychee-action@v1
        with:
          # All flags + remap rules live in lychee.toml so the action's
          # bash entrypoint doesn't shell-expand `$1` from regex backrefs.
          args: --config lychee.toml public/**/*.html
          fail: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
