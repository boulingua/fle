name: Build and deploy

on:
  push:
    branches: [main, "migration/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: "0.159.2"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install pyyaml reportlab pypdf python-pptx pillow

      # ── Quarto: render the 156 *_exam.qmd files to PDF (non-blocking).
      # If TinyTeX bootstrap or LaTeX rendering fails for transient reasons
      # (rate limits, mirror outages), the Hugo deploy proceeds without
      # refreshed exam PDFs — they're not yet linked from the new Hugo site
      # and can be regenerated by re-running this workflow.
      - name: Render exam PDFs (non-blocking)
        id: exams
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Setup Quarto + TinyTeX. Both bootstrap commands hit the GitHub API
          # for release metadata; GH_TOKEN avoids anonymous 403s.
          curl -fsSL https://github.com/quarto-dev/quarto-cli/releases/latest/download/quarto-linux-amd64.deb -o /tmp/quarto.deb
          sudo dpkg -i /tmp/quarto.deb
          quarto install tinytex --update-path --quiet
          quarto render --to pdf
          python - <<'PY'
          import sys, pathlib
          from pypdf import PdfReader
          out = pathlib.Path('_exams_out')
          pdfs = list(out.rglob('*_exam.pdf')) if out.exists() else []
          if not pdfs:
              print('No exam PDFs produced.', file=sys.stderr); sys.exit(1)
          bad = []
          for p in pdfs:
              author = (PdfReader(str(p)).metadata or {}).get('/Author', '') or ''
              if 'Le Boulanger' not in author:
                  bad.append(str(p))
          if bad:
              print('MISSING ATTRIBUTION:', *bad, sep='\n  '); sys.exit(1)
          print(f'All {len(pdfs)} exam PDFs attributed to S. Le Boulanger.')
          PY
          mkdir -p static/downloads
          rsync -a --include='*/' --include='*_exam.pdf' --exclude='*' \
            _exams_out/ static/downloads/

      - name: Note exam-render outcome
        if: always()
        run: |
          if [ "${{ steps.exams.outcome }}" = "failure" ]; then
            echo "::warning::Exam PDF render failed (non-blocking). Hugo deploy proceeds."
          else
            echo "Exam PDFs rendered and staged."
          fi

      - name: Generate worksheet placeholders (existing pipeline)
        continue-on-error: true
        run: |
          if [ -f _scripts/make_placeholder_worksheets.py ]; then
            python _scripts/make_placeholder_worksheets.py
          else
            echo "make_placeholder_worksheets.py not present — skipping."
          fi

      # ── Hugo build ───────────────────────────────────────────────
      - name: Install Hugo
        run: |
          wget -q -O /tmp/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb

      - name: Verify Plausible snippet present in head partial
        run: |
          # source partial keeps quotes; minified output drops them — accept either
          grep -qE 'data-domain="?boulingua\.github\.io/fle"?' \
            layouts/_partials/head/extensions.html

      - uses: actions/configure-pages@v5
        id: pages

      - name: Hugo build
        run: hugo --minify --gc --baseURL "${{ steps.pages.outputs.base_url || 'https://boulingua.github.io/fle/' }}"

      - name: Verify Plausible snippet in rendered home page
        run: grep -qE 'data-domain="?boulingua\.github\.io/fle"?' public/index.html

      - name: Verify VG Wort pixels (1:1 manifest <-> public/)
        run: bash scripts/verify-vgwort.sh vgwort-manifest.csv public

      # TODO: re-enable lychee once we figure out how to make it resolve
      # /fle/-prefixed absolute URLs against the local public/ tree without
      # false-positives. For now, the build is link-correctness-checked at
      # render time by Hugo's --printPathWarnings.
      - name: Broken-link check (lychee, advisory)
        continue-on-error: true
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --no-progress --offline --include-fragments
            --exclude '^/fle/'
            --base public public/**/*.html
          fail: false

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
