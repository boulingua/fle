name: Regenerate materials placeholders

# Manual-trigger workflow: re-runs _scripts/make_materials.py on Ubuntu
# with LibreOffice installed, so both PDF (worksheet) and PPTX
# (presentation) thumbnails are real first-page / first-slide renders
# rather than PIL fallbacks. Commits the refreshed PNGs back to main.
#
# Use sparingly — only when the underlying placeholder generator changes
# or when materials are first wired in. Day-to-day, real materials are
# replaced by hand and their thumbnails are regenerated by this same
# script run locally with LibreOffice + pypdfium2 installed.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install python-pptx reportlab pillow pypdfium2 pyyaml

      - name: Install LibreOffice (PPTX → PDF conversion)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libreoffice-impress

      - name: Regenerate placeholders + thumbnails
        run: python _scripts/make_materials.py

      - name: Commit refreshed thumbnails
        run: |
          git config user.name "s-leboulanger"
          git config user.email "277736839+s-leboulanger@users.noreply.github.com"
          git add static/materials/
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          # Don't include the pptx/pdf binaries themselves in the commit
          # unless they actually changed — the script regenerates them
          # deterministically from frontmatter, so byte-identical PPTX/PDF
          # generations should not bloat history.
          git diff --cached --stat
          git commit -m "chore(materials): regenerate placeholder thumbnails (real first-page renders)"
          git push origin HEAD:main
