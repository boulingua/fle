# Slim PDF-only Quarto config.
#
# After the Hugo migration, this repo's HTML is rendered by Hugo (see hugo.toml).
# Quarto remains in use for one purpose only: rendering the 156 *_exam.qmd
# files (devoir surveillé / épreuve finale) into PDF, since LaTeX-based PDF
# typesetting is outside Hugo's scope.
#
# CI runs `quarto render --to pdf` against the project root and copies the
# resulting PDFs into `static/downloads/<track>/<unit>_exam.pdf` so Hugo can
# serve them as static files.

project:
  type: default
  render:
    - "track_*/units/*_exam.qmd"
  output-dir: _exams_out

format:
  pdf:
    documentclass: article
    papersize: a4
    fontsize: 11pt
    geometry: [margin=25mm]
    include-in-header: _includes/_exam.tex
    number-sections: false
    toc: false

author: "S. Le Boulanger"
lang: fr
