# curriculum_outline.yml — plan thématique complet FLE BW
#
# 13 cours × 12 Unités = 156 Unités au total.
# G+M : Kl. 6-10 (5 cours)  ·  E : Kl. 6-13 (8 cours)
#
# Chaque Unité reçoit :
#   - un thème principal (progressif par Klassenstufe),
#   - un focus par compétence (compétences fonctionnelles 3.1.3.x),
#   - un type d'épreuve (klassenarbeit Kl. 6-10 ; abitur_bf / abitur_lf Kl. 11-13),
#   - une référence Bildungsplan-Code (verbatim),
#   - des cast-personnages récurrents (introduits par Klassenstufe).
#
# Statut : Phase 2 Turn 6 — proposé. La cast et la progression
# suivent la logique BW Bildungsplan 2016 + OS 2021.

site: "fle-bw"
outline_version: "2026-04-25-draft1"
courses_total: 13
units_total: 156

module_balance_target_per_course:
  hör_hörsehverstehen: 2     # 3.1.3.1
  leseverstehen: 2            # 3.1.3.2
  sprechen_dialog: 2          # 3.1.3.3
  sprechen_monolog: 1         # 3.1.3.4
  schreiben: 2                # 3.1.3.5
  sprachmittlung: 1           # 3.1.3.6
  sprachreflexion: 1          # 3.1.3.7-9 + 3.1.4
  text_medien: 1              # 3.1.4

# ===========================================================
# PARCOURS G+M (Klasse 6-10) — 5 cours, 60 Unités
# ===========================================================

