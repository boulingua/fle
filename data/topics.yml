# Topic registry — single source of truth for the Materials Network.
#
# Each topic is the coarse "what kind of competence does this unit work on"
# bucket used by the discovery graph at /materiel/ to colour nodes and
# group facets. Topics are derived from the existing `skills_focus`
# frontmatter on every unit; the four typos flagged in the Phase 0 audit
# (`hoerverstehen` vs `hör_hörsehverstehen`, `text_medien` vs
# `textmedienkompetenz`) are normalised at graph-build time, not in the
# article frontmatter.
#
# Adding a topic: add a new entry here AND ensure at least one article's
# `skills_focus` resolves to its `id` (otherwise the build fails).
# Removing a topic: first move all articles using it to a different one.
#
# Colours: the first six follow the Phase 5 prompt's palette (sage, warm
# sand, muted violet, slate blue, terracotta, olive). The remaining three
# extend the same muted academic register. All colours should pass WCAG
# AA contrast on both Coder light and dark backgrounds — verify at
# Phase 2 with a contrast checker, not by eye.

