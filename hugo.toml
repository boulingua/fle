baseURL = "https://boulingua.github.io/fle/"
title = "FLE — S. Le Boulanger"
languageCode = "fr"
defaultContentLanguage = "fr"
enableEmoji = false

[pagination]
  pagerSize = 20

[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3
  ordered = false

[params]
  author = "S. Le Boulanger"
  description = "Curriculum FLE bilingue pour l'enseignement secondaire, classes 6 à 13, aligné sur un référentiel régional."
  keywords = "FLE,français langue étrangère,enseignement secondaire,Bildungsplan,OER,CECRL,curriculum"
  info = ["FLE · Classes 6 à 13", "Curriculum bilingue OER", "S. Le Boulanger"]
  dateFormat = "2006-01-02"
  hideFooter = false
  hideCredits = true
  since = 2025
  colorScheme = "auto"
  customCSS = ["css/custom.css"]
  repoURL = "https://github.com/boulingua/fle"

[[params.social]]
  name = "GitHub"
  icon = "fa-brands fa-github fa-2x"
  weight = 1
  url = "https://github.com/boulingua/fle"

