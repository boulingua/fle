baseURL = "https://boulingua.github.io/fle/"
title = "FLE — S. Le Boulanger"
languageCode = "fr"
defaultContentLanguage = "fr"
enableEmoji = false

[pagination]
  pagerSize = 20

[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 2
  endLevel = 3
  ordered = false

[params]
  author = "S. Le Boulanger"
  description = "Curriculum FLE bilingue pour l'enseignement secondaire, classes 6 à 13, aligné sur un référentiel régional."
  keywords = "FLE,français langue étrangère,enseignement secondaire,Bildungsplan,OER,CECRL,curriculum"
  info = ["FLE · Classes 6 à 13", "Curriculum bilingue OER", "S. Le Boulanger"]
  dateFormat = "2006-01-02"
  hideFooter = false
  hideCredits = true
  since = 2025
  colorScheme = "auto"
  customCSS = ["css/custom.css", "css/network.css"]
  repoURL = "https://github.com/boulingua/fle"
  # Short brand label for the top-of-page navbar. Browser title and OG meta
  # continue to use the full `title = "FLE — S. Le Boulanger"`.
  navbarTitle = "FLE"

[[params.social]]
  name = "GitHub"
  icon = "fa-brands fa-github fa-2x"
  weight = 1
  url = "https://github.com/boulingua/fle"

# ── Top navbar ─────────────────────────────────────────────
# Five left-aligned items, plus Mentions légales right-aligned (params.align
# = "end") and the GitHub icon further right (rendered as a fixed item by
# layouts/_partials/header.html). The Coder theme renders only top-level
# menu entries — sub-items remain in the config for footer / sitemap use
# but are not visible in the bar. Pages dropped from the bar (Référentiel,
# Programme, Références) are reachable via the footer and cross-page links.

[[menu.main]]
  name = "Accueil"
  weight = 1
  url = "/"

[[menu.main]]
  name = "À propos"
  weight = 2
  url = "/a_propos/"

[[menu.main]]
  identifier = "materiel"
  name = "Matériel"
  weight = 3
  url = "/materiel/"

# Filière G+M dropdown
[[menu.main]]
  identifier = "track-gm"
  name = "Filière G+M"
  weight = 4
  url = "/filiere-gm/"

# Filière E dropdown
[[menu.main]]
  identifier = "track-e"
  name = "Filière E"
  weight = 5
  url = "/filiere-e/"

# Right-side legal dropdown — params.align = "end" pushes it to the
# right of the navbar (margin-left:auto on the first end-aligned item).
[[menu.main]]
  identifier = "legal"
  name = "Impressum"
  weight = 99
  url = "/impressum/"
  [menu.main.params]
    align = "end"

[module]
  [[module.imports]]
    path = "github.com/luizdepra/hugo-coder"
