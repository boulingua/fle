<section class="container page">
  <article>
    <header>
      <h1 class="title">
        <a class="title-link" href="{{ .Permalink | safeURL }}">
          {{ .Title }}
        </a>
      </h1>
      {{- with .Params.subtitle }}<p class="subtitle">{{ . }}</p>{{ end -}}
    </header>

    {{- partial "material-links.html" . -}}

    {{ .Content }}

    {{- partial "vgwort.html" . -}}
  </article>
</section>
