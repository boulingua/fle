# lychee config — keep here so the lychee-action's bash entrypoint
# doesn't shell-expand `$1` from remap patterns. Lychee's pattern
# language uses `$1`, `$2`, ... for regex backrefs.

no_progress = true
include_fragments = true
offline = true
# Resolved against a *separate* relative-baseURL build at /tmp/lychee-public
# (see hugo.yml). That second build emits internal links as /foo/ instead
# of the production https://boulingua.github.io/fle/foo/, so --base just
# works without remap rules (which lychee requires to produce full URLs,
# not bare paths).
base = "/tmp/lychee-public"
